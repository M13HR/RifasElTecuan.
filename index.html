<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tecuan</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }

        .header-card {
            background: linear-gradient(180deg, #1b3d1f 0%, #121212 100%);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        h1 { color: #ffeb3b; margin: 10px 0; font-size: 24px; }
        .price-tag { background: #ffeb3b; color: black; padding: 5px 20px; border-radius: 20px; font-weight: bold; display: inline-block; }

        .info-box {
            border: 1px dashed #ffeb3b;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            width: 90%;
        }

        .promo-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .promo-btn {
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 10px;
            flex: 1;
            font-size: 12px;
        }

        .search-bar {
            width: 90%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .grid-container {
            background: #000;
            padding: 15px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            width: 90%;
        }

        .num {
            background: #2a2a2a;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .num.selected { background: #00c853; }

        input[type="text"], input[type="tel"], select {
            width: 90%;
            padding: 15px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
        }

        .btn-main {
            background: #00c853;
            color: white;
            width: 90%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
        }

        .footer { font-size: 12px; text-align: left; width: 90%; opacity: 0.8; line-height: 1.6; }
    </style>
</head>

            <div>🎁 <b>PRONTO PAGO</b> <span style="float:right; color:#00c853">$2,000 MXN</span></div>
        </div>
    </div>

    <img src="Para rifas 17 Pro Max.jpeg" style="width: 90%; border-radius: 15px; margin-top: 15px;">

    <div class="promo-buttons">

        <div class="promo-btn">5 Boletos<br><span style="color:#00c853">$300</span></div>
    </div>

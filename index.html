<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifas El Tecuan - Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; background: #1a1a1a; padding: 20px; border-radius: 25px; border: 1px solid #333; text-align: center; box-sizing: border-box; }
        .logo { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #25d366; background: white; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo img { max-width: 90%; }
        h2 { color: #25d366; margin: 0 0 20px; font-size: 22px; text-transform: uppercase; }
        
        /* Buscador */
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
        
        /* Grid de Números */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; height: 280px; overflow-y: auto; background: #111; padding: 10px; border-radius: 15px; border: 1px solid #333; margin: 15px 0; }
        .num { padding: 12px 0; background: #333; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; color: #bbb; }
        .num.selected { background: #25d366 !important; color: black !important; transform: scale(1.05); }
        .num.occupied { background: #444; color: #666; cursor: not-allowed; opacity: 0.3; }

        /* Tabla de Precios (Combos) */
        .combos { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        .combo-item { display: flex; justify-content: space-between; padding: 10px 15px; background: #222; border-radius: 10px; border: 1px solid #333; font-size: 14px; }
        .best { border: 2px solid #25d366; background: linear-gradient(145deg, #1a1a1a, #142e1f); }
        .precio { color: #25d366; font-weight: bold; }

        .btn { background: #25d366; color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #sel-count { color: #25d366; font-weight: bold; margin: 10px 0; display: block; }
    </style>
</head>
<body>
    <div class="app">
        <div class="logo"><img src="https://i.postimg.cc/tTrzGvdX/tecuan_png.png"></div>
        <h2>Rifas El Tecuan</h2>
        
        <input type="number" id="search" placeholder="🔍 Buscar número..." oninput="buscar()">
        
        <div id="grid" class="grid">Cargando números...</div>

        <div class="combos">
            <div class="combo-item"><span>1 Boleto</span><span class="precio">$75</span></div>
            <div class="combo-item"><span>3 Boletos</span><span class="precio">$200</span></div>
            <div class="combo-item best"><span>5 Boletos (🔥 Especial)</span><span class="precio">$300</span></div>
        </div>

        <input type="text" id="nombre" placeholder="Tu Nombre Completo">
        <input type="number" id="whatsapp" placeholder="WhatsApp (10 dígitos)">
        
        <span id="sel-count">Seleccionados: 0</span>
        
        <button id="btn" class="btn" onclick="enviar()">APARTAR BOLETOS 🚀</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxb6rDJ3CyBYq92gBbHotp3jyow5k-LPK0FZZopI0-0vTVdj_a17kJf30ZQ1GD2AlZl_A/exec"; 
        let seleccionados = [];

        async function cargar() {
            try {
                const r = await fetch(SCRIPT_URL);
                const ocupados = await r.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for(let i=0; i<1000; i++) {
                    let n = i.toString().padStart(3, '0');
                    let div = document.createElement('div');
                    div.innerText = n;
                    div.id = "n-"+n;
                    div.className = 'num' + (ocupados.includes(n) ? ' occupied' : '');
                    if(!ocupados.includes(n)) div.onclick = () => togg(n, div);
                    grid.appendChild(div);
                }
            } catch (e) {
                document.getElementById('grid').innerText = "Error al conectar.";
            }
        }

        function togg(n, el) {
            if(seleccionados.includes(n)) {
                seleccionados = seleccionados.filter(x => x !== n);
                el.classList.remove('selected');
            } else {
                seleccionados.push(n);
                el.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = "Seleccionados: " + seleccionados.length;
        }

        function buscar() {
            let v = document.getElementById('search').value;
            if(v.length < 1) return;
            let n = v.padStart(3, '0').slice(-3);
            document.getElementById("n-"+n)?.scrollIntoView({behavior:'smooth', block:'center'});
        }

        async function enviar() {
            const n = document.getElementById('nombre').value;
            const w = document.getElementById('whatsapp').value;
            if(!n || !w || seleccionados.length === 0) return alert("Por favor selecciona números y llena tus datos.");

            const b = document.getElementById('btn');
            b.innerText = "REGISTRANDO...";
            b.disabled = true;

            // Enviar a Google
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({nombre:n, whatsapp:w, boletos: seleccionados.join(', ')}) 
            });
            
            // Calcular precio para el mensaje
            let cant = seleccionados.length;
            let total = 0;
            if(cant == 1) total = 75;
            else if(cant >= 2 && cant < 5) total = cant * 66; // Aproximado al combo de 3 por 200
            else if(cant == 5) total = 300;
            else total = cant * 60;

            setTimeout(() => {
                const msj = `🎫 *NUEVO APARTADO - RIFAS EL TECUAN*\n\n` +
                          `👤 *Cliente:* ${n}\n` +
                          `🔢 *Números:* ${seleccionados.join(', ')}\n` +
                          `💰 *Total a pagar:* $${total} MXN\n\n` +
                          `🚀 _Hola, acabo de apartar mis números en el sitio web. Quedo atento para realizar el pago._`;
                
                window.top.location.href = `https://api.whatsapp.com/send?phone=529531024519&text=${encodeURIComponent(msj)}`;
                b.innerText = "¡REDIRECCIONANDO!";
            }, 1000);
        }
        cargar();
    </script>
</body>
</html>

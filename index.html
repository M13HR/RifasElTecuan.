<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas El Tecuan | Sorteo iPhone 17 Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --verde-tecuan: #00C853;
            --oro: #FFD700;
            --negro-fondo: #121212;
            --blanco: #F5F5F5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--negro-fondo);
            color: var(--blanco);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Ajuste de Imágenes con tus nombres de archivo */
        .logo-principal {
            width: 100%;
            max-width: 250px;
            margin-bottom: 20px;
        }

        .iphone-foto {
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid var(--verde-tecuan);
            box-shadow: 0 0 20px rgba(0, 200, 83, 0.3);
        }

        h1 { color: var(--oro); font-size: 1.8em; margin-bottom: 5px; }
        .precio { background: var(--oro); color: black; display: inline-block; padding: 5px 15px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; }

        .premios {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--verde-tecuan);
            margin-bottom: 20px;
        }

        .premio-row { margin: 10px 0; display: flex; justify-content: space-between; }
        .verde { color: var(--verde-tecuan); font-weight: bold; }

        .boton-apartar {
            display: block;
            background: var(--verde-tecuan);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.4);
            margin-top: 25px;
        }

        .footer-info { font-size: 0.8em; margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Logo Rifas el tecuan.png" alt="Rifas El Tecuan" class="logo-principal">

        <h1>IPHONE 17 PRO MAX</h1>
        <div class="precio">BOLETO $75 MXN</div>

        <img src="Para rifas 17 Pro Max.jpeg" alt="iPhone 17 Pro Max" class="iphone-foto">

        <div class="premios">
            <div class="premio-row"><span>🥇 MAYOR</span> <span class="verde">IPHONE 17 PRO MAX</span></div>
            <div class="premio-row"><span>⚡ PRE-EVENTO (50%)</span> <span style="color:var(--oro)">$5,000 MXN</span></div>
            <div class="premio-row"><span>🎁 PRONTO PAGO</span> <span class="verde">$2,000 MXN</span></div>
        </div>

        <a href="https://wa.me/522751035579?text=Hola%20Miguel,%20quiero%20apartar%20mi%20boleto%20para%20el%20iPhone" class="boton-apartar">
            ¡APARTAR MI SUERTE! 🍀
        </a>

        <div class="footer-info">
            <p>📍 UBICACIÓN: Acatlán de Osorio, Puebla.</p>
            <p>🗓️ SORTEO: 14 de Abril (Lotería Nacional).</p>
            <p>⏳ PAGO: Tienes 6 horas para reportar.</p>
        </div>
    </div>

</body>
</html>

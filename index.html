<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifas El Tecuan - Gran Formato</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #25d366; --gold: #ffd700; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; padding-bottom: 120px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: var(--card); border-radius: 30px; border: 1px solid #333; overflow: hidden; text-align: center; }
        
        /* HEADER */
        .hero { background: linear-gradient(180deg, #1b4d2b 0%, #0a0a0a 100%); padding: 25px 20px; border-bottom: 4px solid var(--primary); }
        .logo-img { width: 100px; margin-bottom: 12px; filter: drop-shadow(0 0 5px var(--primary)); }
        .hero h1 { color: var(--gold); font-size: 20px; margin: 0; letter-spacing: 1px; }
        .badge-loteria { background: #e74c3c; color: white; font-size: 11px; padding: 5px 12px; border-radius: 5px; margin-top: 8px; display: inline-block; font-weight: bold; }

        .promo-img { width: 92%; border-radius: 20px; margin: 15px auto; border: 1px solid #444; display: block; }

        /* BUSCADOR PRO */
        .search-area { background: #222; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .search-area h3 { font-size: 14px; color: var(--gold); margin: 0 0 15px 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 16px; border-radius: 12px; border: 2px solid #444; background: #000; color: white; font-size: 20px; text-align: center; outline: none; }
        .input-group input:focus { border-color: var(--primary); }
        .btn-buscar { background: var(--gold); border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buscar:active { transform: scale(0.95); }

        /* MENSAJE DE ESCANEO */
        #scan-msg { font-size: 12px; color: var(--primary); font-family: monospace; height: 15px; margin-bottom: 5px; opacity: 0; }

        /* COMBOS */
        .combos-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 0 15px 15px 15px; }
        .combo-card { background: #111; padding: 12px 5px; border-radius: 12px; border: 1px solid #444; cursor: pointer; }
        .combo-card b { display: block; color: var(--primary); font-size: 15px; }
        
        .mayoreo-card { background: rgba(37, 211, 102, 0.1); border: 2px dashed var(--primary); margin: 0 15px 15px 15px; padding: 15px; border-radius: 15px; cursor: pointer; animation: pulse 2s infinite; }

        /* CARRITO */
        #carrito-lucky { display: none; background: #000; margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(37, 211, 102, 0.2); }
        .lucky-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .tag { background: var(--primary); color: black; padding: 6px 12px; border-radius: 6px; font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .tag span { cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center; }

        /* GRID LIMITADO */
        .grid-header { font-size: 11px; color: #777; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; height: 280px; overflow-y: auto; background: #000; padding: 15px; border-radius: 15px; margin: 0 15px 15px 15px; border: 1px solid #222; }
        .num { padding: 12px 0; background: #2a2a2a; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; color: #ccc; }
        .num.selected { background: var(--primary) !important; color: black !important; }
        .num.apartado { background: #444; color: #777; cursor: not-allowed; opacity: 0.5; }
        .num.pagado { background: #e74c3c; color: white; cursor: not-allowed; opacity: 0.3; }
        
        .btn-flotante { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--primary); color: black; border: none; padding: 18px 45px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 25px rgba(0,255,0,0.4); z-index: 1000; display: none; width: 85%; }

        #seccion-datos { display: none; padding: 25px; background: #1a1a1a; border-radius: 20px; margin: 15px; border: 1px solid #333; text-align: left; }
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-enviar { background: var(--primary); color: black; border: none; padding: 20px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="hero">
            <img src="Logo Rifas el tecuan.png" class="logo-img">
            <h1>IPHONE 17 PRO MAX</h1>
            <div class="badge-loteria">SORTEO MAYOR: 60,000 NÚMEROS</div>
        </div>

        <img src="Para rifas 17 Pro Max.jpeg" class="promo-img">

        <div class="search-area">
            <h3>🔍 BUSCA TU NÚMERO (00000-59999)</h3>
            <div id="scan-msg"></div>
            <div class="input-group">
                <input type="number" id="input-busqueda" placeholder="Ej: 48512" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);">
                <button class="btn-buscar" onclick="buscarNumero()">BUSCAR</button>
            </div>
        </div>

        <div class="combos-container">
            <div class="combo-card" onclick="maquinaSuerte(1)"><span>1 NÚMERO</span><b>$75</b></div>
            <div class="combo-card" onclick="maquinaSuerte(3)"><span>3 NÚMEROS</span><b>$200</b></div>
            <div class="combo-card" onclick="maquinaSuerte(5)"><span>5 NÚMEROS</span><b>$300</b></div>
        </div>

        <div class="mayoreo-card" onclick="maquinaSuerte(6)">
            <span style="font-size: 11px; color: var(--primary); font-weight: bold;">💎 PROMO IMPERDIBLE 💎</span>
            <div style="font-size: 15px;">Lleva <b>6 o más</b> y paga solo <b style="color:var(--primary); font-size: 18px;">$60 c/u</b></div>
        </div>

        <div id="carrito-lucky">
            <div style="font-size: 12px; color: var(--gold);">🎟️ TUS NÚMEROS ELEGIDOS</div>
            <div id="tags-contenedor" class="lucky-tags"></div>
        </div>

        <div class="grid-header">Mostrando sugerencias (0000 - 1000)</div>
        <div id="grid" class="grid">Cargando la suerte...</div>

        <button class="btn-flotante" id="btn-flotante" onclick="irAlFormulario()">APARTAR MI SUERTE 🍀</button>

        <div id="seccion-datos">
            <h2 style="color: var(--gold); font-size: 18px; text-align: center; margin-top: 0;">📝 REGISTRO DE APARTADO</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="number" id="whatsapp" placeholder="WhatsApp (10 dígitos)">
            <select id="estado">
                <option value="" disabled selected>Selecciona tu Estado</option>
                <option value="Puebla">Puebla</option><option value="Oaxaca">Oaxaca</option><option value="CDMX">CDMX</option>
                <option value="Veracruz">Veracruz</option><option value="Guerrero">Guerrero</option>
            </select>
            <input type="text" id="municipio" placeholder="Municipio">
            <button id="btn-final" class="btn-enviar" onclick="enviar()">APARTAR AHORA 🐯</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi6SvyoAhvWftjI5ZfmaFJ2u38eQlpcGiiISKLyA26KpSFvIMT70USxhzI7P3nVYmEgQ/exec"; 
        let seleccionados = [];
        let apartadosRemotos = [];
        let pagadosRemotos = [];

        // CARGA INICIAL (Solo 1,000 para velocidad)
        async function cargar() {
            try {
                const r = await fetch(SCRIPT_URL);
                const data = await r.json();
                apartadosRemotos = data.apartados;
                pagadosRemotos = data.pagados;

                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                for(let i=0; i <= 1000; i++) {
                    let n = i.toString().padStart(5, '0');
                    crearBoletoDOM(n, grid);
                }
            } catch (e) { document.getElementById('grid').innerText = "Error de conexión."; }
        }

        function crearBoletoDOM(n, contenedor) {
            let div = document.createElement('div');
            div.innerText = n; div.id = "n-"+n;
            if (pagadosRemotos.includes(n)) div.className = 'num pagado';
            else if (apartadosRemotos.includes(n)) div.className = 'num apartado';
            else { 
                div.className = 'num'; 
                div.onclick = () => togg(n, div); 
                if(seleccionados.includes(n)) div.classList.add('selected');
            }
            contenedor.appendChild(div);
        }

        // BUSCADOR CON EFECTO DE ESCANEO 🕵️‍♂️
        async function buscarNumero() {
            let n = document.getElementById('input-busqueda').value.padStart(5, '0');
            const scanMsg = document.getElementById('scan-msg');
            
            if(parseInt(n) > 59999 || isNaN(parseInt(n))) return alert("Número fuera de rango (0-59999)");

            // Efecto Visual de Escaneo
            scanMsg.style.opacity = "1";
            const frases = ["Verificando...", "Escaneando Lotería...", "Cotejando disponibilidad...", "¡Encontrado!"];
            
            for(let frase of frases) {
                scanMsg.innerText = ">> " + frase;
                await new Promise(r => setTimeout(r, 400));
            }

            if(pagadosRemotos.includes(n) || apartadosRemotos.includes(n)) {
                scanMsg.innerText = ">> EL NÚMERO YA TIENE DUEÑO ❌";
                scanMsg.style.color = "#e74c3c";
                return;
            }

            if(!seleccionados.includes(n)) {
                seleccionados.push(n);
                let el = document.getElementById("n-"+n);
                if(el) el.classList.add('selected');
                confetti({ particleCount: 60, spread: 40, colors: ['#25d366', '#ffd700'] });
            }
            
            scanMsg.style.opacity = "0";
            actualizar();
        }

        function maquinaSuerte(cant) {
            const cantidad = cant || 10;
            let encontrados = 0;
            let bucle = 0;

            while(encontrados < cantidad && bucle < 100) {
                let azar = Math.floor(Math.random() * 60000).toString().padStart(5, '0');
                if(!apartadosRemotos.includes(azar) && !pagadosRemotos.includes(azar) && !seleccionados.includes(azar)) {
                    seleccionados.push(azar);
                    let el = document.getElementById("n-"+azar);
                    if(el) el.classList.add('selected');
                    encontrados++;
                }
                bucle++;
            }
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            actualizar();
            document.getElementById('carrito-lucky').scrollIntoView({ behavior: 'smooth' });
        }

        function togg(n, el) {
            if(seleccionados.includes(n)) { 
                seleccionados = seleccionados.filter(x => x !== n); 
                if(el) el.classList.remove('selected'); 
            } else { 
                seleccionados.push(n); 
                if(el) el.classList.add('selected'); 
            }
            actualizar();
        }

        function actualizar() {
            const carrito = document.getElementById('carrito-lucky');
            const contenedor = document.getElementById('tags-contenedor');
            const btnFlotante = document.getElementById('btn-flotante');
            contenedor.innerHTML = '';
            
            if(seleccionados.length > 0) {
                carrito.style.display = 'block';
                btnFlotante.style.display = (document.getElementById('seccion-datos').style.display === 'block') ? 'none' : 'block';
                seleccionados.forEach(n => {
                    const tag = document.createElement('div');
                    tag.className = 'tag';
                    tag.innerHTML = `${n} <span onclick="quitarNumero('${n}')">×</span>`;
                    contenedor.appendChild(tag);
                });
            } else {
                carrito.style.display = 'none';
                btnFlotante.style.display = 'none';
            }
        }

        function quitarNumero(n) {
            seleccionados = seleccionados.filter(x => x !== n);
            let el = document.getElementById("n-"+n);
            if(el) el.classList.remove('selected');
            actualizar();
        }

        function irAlFormulario() {
            document.getElementById('btn-flotante').style.display = 'none';
            document.getElementById('seccion-datos').style.display = 'block';
            document.getElementById('seccion-datos').scrollIntoView({ behavior: 'smooth' });
        }

        async function enviar() {
            const n = document.getElementById('nombre').value;
            const w = document.getElementById('whatsapp').value;
            const est = document.getElementById('estado').value;
            const mun = document.getElementById('municipio').value;

            if(!n || !w || !est || !mun) return alert("Completa tus datos, Tiger.");
            
            const btn = document.getElementById('btn-final');
            btn.innerText = "🐯 REGISTRANDO..."; btn.disabled = true;

            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ nombre:n, whatsapp:w, boletos: seleccionados.join(', '), estadoRep: est, municipio: mun }) 
            });
            
            setTimeout(() => {
                let total = 0;
                const cant = seleccionados.length;
                if (cant === 3) total = 200;
                else if (cant === 5) total = 300;
                else if (cant >= 6) total = cant * 60;
                else total = cant * 75;

                const msj = `📱 *RIFAS EL TECUAN* 🐯\n\n👤 *NOMBRE:* ${n}\n🔢 *NÚMEROS:* ${seleccionados.join(', ')}\n💰 *TOTAL:* $${total} MXN\n⏳ Tiempo límite: 6 horas.`;
                window.top.location.href = `https://api.whatsapp.com/send?phone=529531024519&text=${encodeURIComponent(msj)}`;
            }, 1200);
        }

        cargar();
    </script>
</body>
</html>
